spring.application.name=cron-scheduler
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5434/cronscheduler
spring.datasource.username=cronscheduler
spring.datasource.password=cronscheduler

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

scheduler.poll-interval-ms=5000
scheduler.initial-delay-ms=5000
scheduler.batch-size=100
scheduler.http.connect-timeout-ms=5000
scheduler.http.read-timeout-ms=10000

# Job execution pool. Polling stays on a single scheduling thread (there is only
# one @Scheduled method and fixedDelay is non-reentrant); these threads run the jobs.
scheduler.execution.core-pool-size=5
scheduler.execution.max-pool-size=10
scheduler.execution.queue-capacity=50
scheduler.execution.shutdown-await-seconds=30
